name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -e . && pip install pytest httpx

      - name: Check package imports
        run: python -c "import kaiview.server; print('kaiview.server imports OK')"

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint with ruff (non-blocking)
        run: |
          pip install ruff
          ruff check kaiview/ --select E,W --ignore E501 || true
